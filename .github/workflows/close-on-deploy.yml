name: Close order issue on merge

# Closes the order issue as soon as its fix lands on main. We deliberately do
# NOT poll Railway for deploy success here: Railway is configured to "wait for
# CI" before deploying, so a job that blocks on the deploy reaching SUCCESS
# deadlocks (Railway waits for the check-suite, the check-suite waits for the
# deploy). This job just closes the issue and exits in seconds, so it never
# gates the deploy.
#
# Served-signal semantics: a closed issue now means "fix merged to main"
# (deploy assumed to follow), not "deploy confirmed". The lazy /order status
# reconciler reads the closed state to flip orders to SERVED. Deploy failures
# are surfaced separately via the deploy_event / Railway logs, not by leaving
# the order open.
on:
  push:
    branches: [main]

jobs:
  close-on-merge:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Extract issue number from merge commit
        id: extract
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          # Look for "Part of #123" or "Fixes #123" in the merge commit message
          ISSUE=$(echo "$COMMIT_MSG" | grep -ioP '(?:part of|fixes|closes|resolves)\s+#\K[0-9]+' | head -1)
          if [ -z "$ISSUE" ]; then
            echo "No order issue reference found in commit, skipping."
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "issue=$ISSUE" >> "$GITHUB_OUTPUT"
            echo "found=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Close the order issue
        if: steps.extract.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE: ${{ steps.extract.outputs.issue }}
        run: |
          gh issue close "$ISSUE" \
            --repo "${{ github.repository }}" \
            --comment "Merged to main — deploying to Railway. Order served."
