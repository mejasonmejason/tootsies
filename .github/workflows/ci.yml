name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: install
        run: pip install -r requirements-dev.txt

      - name: ruff
        run: ruff check .

      - name: mypy
        run: mypy .

      - name: pytest
        # --cov + --cov-fail-under are configured in pyproject.toml [tool.pytest.ini_options]
        # so this single invocation also enforces the coverage gate.
        run: pytest -q
