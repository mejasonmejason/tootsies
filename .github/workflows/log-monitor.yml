name: log-monitor

# Polls Railway runtime logs every 30 min, auto-files GitHub issues for new
# error signatures, comments bursts on existing ones, and commits the dedupe
# state file back to main. See scripts/log_monitor.py for the full contract.

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

concurrency:
  # Serialize: never let two ticks race the state file or double-file the same
  # error signature.
  group: log-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      # contents:write so the job can commit the updated state file back to main.
      # issues:write so gh can file + comment on bug issues.
      contents: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # We commit back to the same branch we ran on; need a writable token.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Railway CLI
        run: |
          curl -fsSL https://railway.com/install.sh | bash
          # The installer drops the binary in ~/.railway/bin; make sure subsequent
          # steps can find it without needing an absolute path.
          echo "$HOME/.railway/bin" >> "$GITHUB_PATH"

      - name: Install Python deps
        # Only the runtime requirements are needed here (anthropic + stdlib).
        # The dev tools (ruff, mypy, pytest) don't run in this job.
        run: pip install -r requirements.txt

      - name: Run log monitor
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # The bot's own runtime config vars need stub values so importing
          # claude_client (which loads persona which loads config) doesn't blow
          # up. None of these are used by the monitor; it never calls Discord
          # or the database.
          DISCORD_TOKEN: "monitor-stub"
          DATABASE_URL: "postgres://stub:stub@stub:5432/stub"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: python scripts/log_monitor.py

      - name: Commit updated state if changed
        run: |
          if git diff --quiet -- .log-monitor-state.json; then
            echo "no state changes to commit."
            exit 0
          fi
          git config user.name "log-monitor-bot"
          git config user.email "log-monitor-bot@users.noreply.github.com"
          git add .log-monitor-state.json
          git commit -m "log-monitor: update state $(date -u +%Y-%m-%dT%H:%MZ)"
          git push
