name: Sync order status on issue close

on:
  issues:
    types: [closed]

jobs:
  sync-order-status:
    if: contains(github.event.issue.labels.*.name, 'order')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install asyncpg

      - name: Update order status in bot DB
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ISSUE: ${{ github.event.issue.number }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::warning::DATABASE_URL not set, skipping DB update."
            exit 0
          fi
          python scripts/update_order_status.py "$ISSUE" served
